[build]
  publish = "."

# Security headers for all routes
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache images for 1 year (content-addressed filenames)
[[headers]]
  for = "/pixels/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/blurs/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Never cache schedule.json — it gets updated regularly
[[headers]]
  for = "/pixels/schedule.json"
  [headers.values]
    Cache-Control = "no-cache"

[[headers]]
  for = "/mosaics/schedule.json"
  [headers.values]
    Cache-Control = "no-cache"

# Cache CSS for 1 day
[[headers]]
  for = "*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"
